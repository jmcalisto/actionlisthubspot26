<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HubSpot Task List Training — Wall Street English</title>
<style>
:root{
  --navy:#33475b;
  --navy-2:#41577b;
  --navy-3:#4a5f77;
  --orange:#ff7a59;
  --orange-d:#e8663f;
  --teal:#0091ae;
  --teal-2:#00a4bd;
  --ink:#33475b;
  --muted:#516f90;
  --muted-2:#7c98b6;
  --border:#cbd6e2;
  --bg:#f5f8fa;
  --white:#ffffff;
  --green:#00bda5;
  --green-d:#00a28c;
  --yellow:#f5c26b;
  --red:#f2545b;
  --peach:#fef2e5;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#eef2f6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);}
#page{max-width:1400px;margin:0 auto;padding:20px 20px 60px;}

/* ---------- Header / progress ---------- */
#brief{padding:6px 4px 18px;}
#brief h1{font-size:22px;margin:0 0 2px;color:var(--navy);}
#brief p{margin:0 0 14px;color:var(--muted);font-size:14px;}
#module-progress{display:flex;gap:8px;flex-wrap:wrap;}
.mod-chip{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);border-radius:20px;padding:7px 14px 7px 8px;font-size:13px;color:var(--muted);}
.mod-chip .dot{width:22px;height:22px;border-radius:50%;background:var(--border);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none;}
.mod-chip.active{border-color:var(--orange);color:var(--navy);font-weight:600;box-shadow:0 0 0 1px var(--orange) inset;}
.mod-chip.active .dot{background:var(--orange);}
.mod-chip.done .dot{background:var(--green);}
.mod-chip.done{color:var(--navy);}

/* ---------- Stage (fake browser window) ---------- */
#stage-wrap{position:relative;}
#browser-chrome{background:#dde4ea;border:1px solid var(--border);border-bottom:none;border-radius:10px 10px 0 0;padding:9px 14px;display:flex;align-items:center;gap:8px;}
#browser-chrome .tl{display:flex;gap:6px;}
#browser-chrome .tl span{width:10px;height:10px;border-radius:50%;display:block;}
#browser-chrome .tl span:nth-child(1){background:#f2545b;}
#browser-chrome .tl span:nth-child(2){background:#f5c26b;}
#browser-chrome .tl span:nth-child(3){background:#00bda5;}
#browser-chrome .addr{flex:1;background:#fff;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--muted);margin-left:6px;}
#stage{position:relative;background:var(--white);border:1px solid var(--border);border-radius:0 0 10px 10px;overflow:hidden;min-height:640px;box-shadow:0 18px 40px -20px rgba(51,71,91,.35);}
#stage-inner{position:relative;}

/* ---------- HubSpot topbar ---------- */
.hs-topbar{height:56px;background:var(--navy);display:flex;align-items:center;gap:16px;padding:0 18px;color:#fff;}
.hs-wordmark{font-weight:800;font-size:18px;letter-spacing:.2px;display:flex;align-items:center;gap:4px;flex:none;}
.hs-wordmark .dot{color:var(--orange);}
.hs-search{flex:1;max-width:420px;background:#425b76;border-radius:6px;height:34px;display:flex;align-items:center;gap:8px;padding:0 10px;color:#c6d3e0;font-size:13px;}
.hs-search .kbd{margin-left:auto;background:#33475b;border-radius:4px;padding:2px 6px;font-size:11px;color:#9db3c7;}
.hs-top-icons{margin-left:auto;display:flex;align-items:center;gap:18px;font-size:13px;color:#c6d3e0;}
.hs-top-icons .ic{width:19px !important;height:19px !important;opacity:.9;flex:none;}
.ic{width:17px;height:17px;flex:none;vertical-align:middle;}
.hs-bell{position:relative;}
.hs-bell .badge{position:absolute;top:-7px;right:-9px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 4px;}
.hs-assistant{display:flex;align-items:center;gap:5px;color:#fff;font-weight:600;}
.hs-account{display:flex;align-items:center;gap:7px;font-weight:600;color:#fff;}
.hs-account .av{width:24px;height:24px;border-radius:50%;background:#7c98b6;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;}

/* ---------- Left sidebar ---------- */
.hs-body{display:flex;min-height:584px;}
.hs-sidebar{width:56px;flex:none;background:var(--navy);border-right:1px solid #2a3b4c;display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;overflow:hidden;}
.hs-sb-icon{width:38px;height:38px;flex:none;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#c6d3e0;cursor:pointer;position:relative;}
.hs-sb-icon.active{background:#425b76;color:#fff;}
.hs-sb-icon svg,.hs-sb-icon .ic{width:20px !important;height:20px !important;flex:none;}
.hs-sb-sep{width:26px;height:1px;background:#465e77;margin:6px 0;}
.hs-sb-icon.hotspot::after{content:'';position:absolute;inset:-4px;border-radius:10px;box-shadow:0 0 0 3px var(--orange);animation:pulse 1.4s infinite;pointer-events:none;}

/* ---------- Flyout menus ---------- */
.flyout{position:absolute;top:56px;left:56px;width:340px;background:var(--navy);color:#fff;z-index:40;box-shadow:14px 20px 40px -12px rgba(0,0,0,.45);max-height:560px;overflow-y:auto;}
.flyout .fy-title{font-size:20px;font-weight:800;padding:20px 22px 10px;}
.flyout a.fy-item{display:flex;align-items:center;justify-content:space-between;padding:11px 22px;color:#e4ebf1;text-decoration:none;font-size:15px;cursor:pointer;}
.flyout a.fy-item:hover{background:#3d5470;}
.flyout a.fy-item.hi{background:#3d5470;}
.flyout .fy-sep{height:1px;background:#4a5f77;margin:6px 0;}
.flyout .fy-bookmark-ic{width:16px;height:16px;opacity:.85;}
.bm-flyout{position:absolute;top:56px;left:56px;width:260px;background:var(--navy);color:#fff;z-index:40;box-shadow:14px 20px 40px -12px rgba(0,0,0,.45);padding:18px 0 10px;}
.bm-flyout .bm-title{font-size:19px;font-weight:800;padding:2px 22px 12px;}
.bm-flyout a.bm-item{display:block;padding:10px 22px;color:#e4ebf1;text-decoration:none;font-size:15px;}
.bm-flyout a.bm-item.hi{background:#3d5470;}
.bm-flyout .bm-sep{height:1px;background:#4a5f77;margin:8px 0;}
.bm-flyout .bm-manage{display:flex;align-items:center;gap:8px;padding:8px 22px;color:#c6d3e0;font-size:13px;}

/* ---------- Main content area ---------- */
.hs-main{flex:1;background:#fff;overflow:hidden;position:relative;}
.pad{padding:22px 26px;}

/* Tabs strip (task views) */
.task-tabs{display:flex;align-items:center;gap:2px;padding:14px 22px 0;border-bottom:1px solid var(--border);}
.task-tabs .tab{padding:11px 18px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;display:flex;align-items:center;gap:8px;}
.task-tabs .tab.active{color:var(--navy);border-bottom-color:var(--orange);}
.task-tabs .tab .count{background:var(--navy);color:#fff;border-radius:10px;font-size:11px;padding:1px 7px;}
.task-tabs .plus{margin-left:6px;width:30px;height:30px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.task-tabs .spacer{flex:1;}
.btn{border:none;border-radius:5px;font-size:13px;font-weight:600;padding:9px 16px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-orange{background:var(--orange);color:#fff;}
.btn-orange:hover{background:var(--orange-d);}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--navy);}
.btn-teal{color:var(--teal);background:transparent;font-weight:600;}

.toolbar{display:flex;align-items:center;gap:10px;padding:16px 22px;flex-wrap:wrap;}
.toolbar .search-box{flex:1;min-width:180px;max-width:340px;border:1px solid var(--border);border-radius:5px;padding:8px 10px;display:flex;align-items:center;gap:8px;color:var(--muted-2);font-size:13px;}
.tb-btn{border:1px solid var(--border);background:#fff;border-radius:5px;padding:8px 12px;font-size:13px;color:var(--navy);display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:600;}
.tb-btn.on{background:#eaf0f6;border-color:#9fb4c8;}

.filter-row{display:flex;gap:8px;align-items:center;padding:0 22px 14px;flex-wrap:wrap;}
.fchip{border:1px solid var(--border);background:#eaf6f9;color:var(--teal);border-radius:5px;padding:7px 10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;}
.fchip.plain{background:#fff;color:var(--teal);}
.fchip .x{color:var(--muted-2);}

table.tsk{width:100%;border-collapse:collapse;font-size:13px;}
table.tsk th{text-align:left;color:var(--navy);font-weight:700;padding:10px 22px;border-bottom:1px solid var(--border);background:#fbfcfd;font-size:12.5px;}
table.tsk td{padding:14px 22px;border-bottom:1px solid #eef2f6;color:var(--navy);}
table.tsk tr:hover td{background:#f8fafc;}
.pill{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;}
.pill.low{background:var(--green);}
.pill.med{background:var(--yellow);}
.pill.none{background:#dbe4ec;}
.tlink{color:var(--teal);font-weight:600;text-decoration:none;cursor:pointer;}
.iconbtn{transition:background .12s;}
.iconbtn:hover{background:#eaf0f6;}

/* Contact record layout */
.rec-header{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);}
.rec-header .crumb{display:flex;align-items:center;gap:8px;color:var(--teal);font-weight:700;font-size:15px;}
.rec-header .crumb b{color:var(--navy);}
.rec-header .rspacer{flex:1;}
.rec-header .navno{color:var(--navy);font-weight:700;font-size:14px;}
.icb{width:30px;height:30px;border-radius:5px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;}
.rec-body{display:flex;min-height:520px;}
.rec-left{width:300px;flex:none;border-right:1px solid var(--border);padding:18px;}
.rec-left h3{font-size:19px;margin:10px 0 14px;color:var(--navy);}
.rec-avatar{width:44px;height:44px;border-radius:50%;background:#dbe4ec;}
.rec-actions{display:flex;gap:18px;margin:16px 0 18px;}
.rec-actions .ra{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:12px;color:var(--teal);}
.rec-actions .ra .circ{width:38px;height:38px;border-radius:50%;background:#eaf6f9;display:flex;align-items:center;justify-content:center;}
.abt{margin-top:8px;}
.abt h4{font-size:13px;color:var(--navy);margin:16px 0 4px;}
.abt .lbl{font-size:12px;color:var(--muted-2);margin-top:12px;}
.abt .val{font-size:13.5px;color:var(--navy);}
.rec-center{flex:1;padding:0;border-right:1px solid var(--border);min-width:0;}
.rec-tabs{display:flex;gap:0;padding:16px 22px 0;border-bottom:1px solid var(--border);}
.rec-tabs .rt{padding:10px 20px;font-size:14px;color:var(--muted);cursor:pointer;}
.rec-tabs .rt.active{color:var(--navy);font-weight:700;border-bottom:3px solid var(--navy);}
.act-tabs{display:flex;gap:22px;padding:14px 22px 0;font-size:13.5px;color:var(--muted);border-bottom:2px solid var(--border);position:relative;}
.act-tabs .at{padding-bottom:12px;cursor:pointer;}
.act-tabs .at.active{color:var(--navy);font-weight:700;}
.act-tabs .at.active::after{content:'';position:absolute;bottom:-2px;left:22px;width:60px;height:2px;background:var(--navy);}
.act-toolbar{display:flex;align-items:center;gap:10px;padding:14px 22px;}
.act-toolbar .sbox{flex:1;max-width:280px;border:1px solid var(--border);border-radius:5px;padding:8px 10px;color:var(--muted-2);font-size:13px;display:flex;justify-content:space-between;}
.act-body{padding:0 22px 22px;}
.month-lbl{font-size:15px;color:var(--navy);font-weight:700;margin:14px 0 10px;}
.card{border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:14px;background:#fff;}
.card.pinned{background:var(--peach);border-color:#f3d9b5;}
.card .chead{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--navy);margin-bottom:6px;}
.card .chead b{font-weight:700;}
.card .cdate{margin-left:auto;color:var(--muted-2);font-size:12.5px;}
.card .ctext{font-size:14px;color:var(--navy);line-height:1.5;}
.card .cfoot{display:flex;align-items:center;margin-top:10px;font-size:13px;color:var(--teal);font-weight:600;}
.card .cfoot .r{margin-left:auto;}
.taskrow{border:1px solid var(--border);border-radius:6px;margin-bottom:14px;overflow:hidden;}
.taskrow .trh{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:13.5px;color:var(--navy);border-bottom:1px solid var(--border);}
.taskrow .trh .due{margin-left:auto;color:var(--muted-2);font-size:12.5px;display:flex;align-items:center;gap:6px;}
.taskrow .trb{padding:12px 16px;display:flex;align-items:center;gap:10px;}
.chk{width:19px;height:19px;border-radius:50%;border:2px solid #c4415a;flex:none;display:flex;align-items:center;justify-content:center;}
.chk.on{background:#00bda5;border-color:#00bda5;}
.strike{text-decoration:line-through;color:var(--muted-2);}
.taskopen{border:1px solid var(--border);border-radius:6px;padding:18px;}
.taskopen .torow{display:flex;gap:24px;margin-bottom:16px;flex-wrap:wrap;}
.taskopen .fld{min-width:120px;}
.taskopen .fld label{display:block;font-size:12px;color:var(--muted-2);margin-bottom:4px;}
.taskopen .fld .v{font-size:13.5px;color:var(--teal);font-weight:600;}
.taskopen .fld .v.plain{color:var(--navy);}
.notesbox{border:1px solid var(--border);border-radius:6px;padding:12px 14px;font-size:13.5px;color:var(--navy);line-height:1.6;margin-top:4px;}

.rec-right{width:310px;flex:none;padding:18px;}
.rr-sec{margin-bottom:8px;}
.rr-sec h4{display:flex;align-items:center;font-size:13px;color:var(--navy);font-weight:700;margin:14px 0 10px;}
.rr-sec h4 .add{margin-left:auto;color:var(--teal);font-weight:700;font-size:13px;}
.dealcard{border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px;font-size:12.5px;}
.dealcard .dt{color:var(--teal);font-weight:700;margin-bottom:6px;}
.dealcard .dl{color:var(--muted-2);}
.dealcard .dv{color:var(--navy);font-weight:600;}
.dealcard .tag{display:inline-block;background:#eaf6f9;color:var(--teal);font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px;margin-top:6px;}
.svccard{border:1px solid var(--border);border-radius:6px;padding:12px;font-size:12.5px;}
.svccard .st{display:flex;align-items:center;gap:8px;color:var(--teal);font-weight:700;margin-bottom:8px;}
.svccard .row{display:flex;justify-content:space-between;margin:5px 0;color:var(--muted-2);}
.svccard .row b{color:var(--navy);font-weight:600;}
.viewall{color:var(--teal);font-weight:600;font-size:12.5px;margin-top:8px;display:block;}

/* Login screen */
.login-wrap{min-height:640px;display:flex;flex-direction:column;align-items:center;padding-top:60px;}
.login-wrap .lw-word{font-size:38px;font-weight:800;color:var(--orange);margin-bottom:26px;}
.login-wrap .lw-word span{color:var(--navy);}
.login-wrap h2{font-size:24px;color:var(--navy);margin:0 0 6px;}
.login-wrap .sub{font-size:13px;color:var(--muted);margin-bottom:18px;}
.login-wrap .sub a{color:var(--teal);}
.err-box{background:#fdecec;border:1px solid #f6b9bd;border-radius:6px;padding:16px 20px;width:360px;margin-bottom:22px;}
.err-box b{display:block;color:var(--navy);font-size:15px;margin-bottom:4px;}
.err-box p{margin:0;font-size:13px;color:var(--navy);}
.login-email{font-size:14px;color:var(--navy);margin-bottom:14px;}
.login-remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--navy);margin-bottom:22px;}
.login-remember .cb{width:16px;height:16px;border-radius:3px;background:var(--teal);}
.login-passkey{background:var(--orange);color:#fff;border:none;border-radius:5px;width:360px;padding:13px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;}
.login-passkey:hover{background:var(--orange-d);}
.login-alt{margin-top:18px;color:var(--teal);font-weight:700;font-size:14px;}

/* Edit columns modal */
.modal-backdrop{position:absolute;inset:0;background:rgba(51,71,91,.55);display:flex;align-items:center;justify-content:center;z-index:60;}
.modal{background:#fff;border-radius:8px;width:760px;max-width:92%;box-shadow:0 30px 60px rgba(0,0,0,.4);overflow:hidden;}
.modal .mhead{background:linear-gradient(90deg,#00a4bd,#00c9b7);color:#fff;padding:22px 26px;font-size:20px;font-weight:800;display:flex;align-items:center;}
.modal .mhead .x{margin-left:auto;cursor:pointer;font-size:18px;}
.modal .mbody{display:flex;padding:20px 26px;gap:20px;}
.modal .mleft{flex:1;}
.modal .msearch{border:1px solid var(--border);border-radius:5px;padding:9px 12px;font-size:13px;color:var(--muted-2);margin-bottom:14px;}
.modal .sectionlbl{font-size:12px;font-weight:700;color:var(--navy);margin:10px 0 6px;letter-spacing:.03em;}
.modal .propline{display:flex;align-items:center;gap:10px;padding:8px 4px;font-size:14px;color:var(--navy);}
.modal .propline input{width:16px;height:16px;}
.modal .mright{width:290px;flex:none;}
.modal .mright h5{font-size:12px;color:var(--navy);font-weight:700;margin:0 0 10px;}
.selcol{background:#eef2f6;border:1px solid var(--border);border-radius:5px;padding:10px 12px;font-size:13.5px;color:var(--navy);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.selcol .h{color:var(--muted-2);cursor:grab;}
.modal .mfoot{padding:16px 26px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;}

/* Note editor modal (top-right dock) */
.note-modal{position:absolute;top:130px;right:26px;width:520px;background:#fff;border-radius:8px 8px 0 0;box-shadow:0 20px 50px rgba(0,0,0,.35);z-index:55;overflow:hidden;}
.note-modal .nmhead{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;}
.note-modal .nmhead .x{margin-left:auto;cursor:pointer;font-size:16px;}
.note-modal .nmbody{padding:16px 18px;}
.note-modal .forrow{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-bottom:12px;}
.note-modal .forrow b{background:#eaf6f9;color:var(--teal);padding:3px 10px;border-radius:12px;font-weight:700;}
.note-ta{min-height:100px;border:1px solid var(--border);border-radius:5px;padding:12px;font-size:14px;color:var(--navy);line-height:1.5;}
.note-ta.placeholder{color:var(--muted-2);}
.note-toolbar{display:flex;gap:14px;padding:10px 0;color:var(--muted-2);font-size:15px;}
.note-modal .assoc{color:var(--teal);font-size:13px;font-weight:600;margin:8px 0 14px;}
.note-followup{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--navy);margin-bottom:16px;}
.note-followup b{color:var(--teal);}
.note-submit{width:100%;background:var(--border);color:#7c98b6;border:none;border-radius:5px;padding:13px;font-weight:700;font-size:14px;}
.note-submit.ready{background:var(--orange);color:#fff;cursor:pointer;}

/* Confirm dialog */
.confirm-modal{background:#fff;border-radius:8px;width:440px;box-shadow:0 30px 60px rgba(0,0,0,.4);overflow:hidden;}
.confirm-modal .chead{background:var(--red);color:#fff;padding:20px 24px;font-size:22px;font-weight:800;}
.confirm-modal .cbody{padding:22px 24px;}
.confirm-modal .cbody p{margin:0 0 18px;font-size:14px;color:var(--navy);}
.confirm-modal .crow{display:flex;gap:10px;}
.btn-red{background:var(--red);color:#fff;}
.btn-light{background:#eaf0f6;color:var(--navy);}

/* toast */
.hs-toast{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:#e5f9f6;border:1px solid #9fe3d8;color:var(--navy);padding:12px 18px;border-radius:6px;font-size:14px;display:flex;align-items:center;gap:14px;z-index:70;box-shadow:0 8px 20px rgba(0,0,0,.12);}
.hs-toast .xx{color:var(--muted-2);cursor:pointer;}

/* highlight / hotspot generic */
.hotspot{position:relative;cursor:pointer;}
.hotspot::before{content:'';position:absolute;inset:-3px;border-radius:6px;box-shadow:0 0 0 3px var(--orange);pointer-events:none;animation:pulse 1.4s infinite;z-index:5;}
@keyframes pulse{0%{box-shadow:0 0 0 2px var(--orange);}50%{box-shadow:0 0 0 6px rgba(255,122,89,.35);}100%{box-shadow:0 0 0 2px var(--orange);}}

/* Small pointer arrow that bobs toward the active hotspot */
.cta-flag{position:absolute;display:none;width:26px;height:26px;transform:translateX(-50%);z-index:90;pointer-events:none;color:var(--orange);filter:drop-shadow(0 2px 3px rgba(255,122,89,.5));animation:ctabob 1.1s ease-in-out infinite;}
.cta-flag svg{width:26px;height:26px;display:block;}
.cta-flag.below svg{transform:rotate(180deg);}
@keyframes ctabob{0%,100%{margin-top:0;}50%{margin-top:-7px;}}
.cta-flag.below{animation:ctabob-down 1.1s ease-in-out infinite;}
@keyframes ctabob-down{0%,100%{margin-top:0;}50%{margin-top:7px;}}

/* Coach panel */
#coach{margin:6px 0 14px;background:linear-gradient(90deg,#33475b,#41577b);border-radius:10px;padding:16px 20px;color:#fff;display:flex;gap:16px;align-items:center;box-shadow:0 10px 24px -12px rgba(51,71,91,.6);}
#coach .coach-left{flex:none;display:flex;flex-direction:column;align-items:center;gap:6px;}
#coach .badge2{background:var(--orange);color:#fff;font-weight:800;font-size:12px;padding:6px 10px;border-radius:16px;white-space:nowrap;}
#coach .coach-count{font-size:11px;color:#a9c0d8;font-weight:700;white-space:nowrap;}
#coach .ctext{flex:1;font-size:14.5px;line-height:1.5;}
#coach .ctext .stepname{display:block;font-weight:800;font-size:16px;margin-bottom:3px;color:#ffd8cc;}
#coach .hint{flex:none;font-size:12.5px;color:#cfe3f7;align-self:center;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);padding:6px 12px;border-radius:16px;}
#restart-link{display:inline-block;margin-top:12px;color:var(--muted);font-size:12.5px;cursor:pointer;text-decoration:underline;}
#restart-link:hover{color:var(--navy);}

/* choice buttons for branch */
.choice-wrap{display:flex;gap:14px;padding:30px;flex-wrap:wrap;justify-content:center;}
.choice-card{width:300px;border:2px solid var(--border);border-radius:10px;padding:22px;cursor:pointer;transition:.15s;}
.choice-card:hover{border-color:var(--orange);box-shadow:0 10px 24px -12px rgba(255,122,89,.5);}
.choice-card h3{margin:0 0 8px;color:var(--navy);font-size:16px;}
.choice-card p{margin:0;color:var(--muted);font-size:13.5px;line-height:1.5;}
.choice-card .em{font-size:28px;margin-bottom:10px;}

/* finish screen */
.finish-wrap{padding:50px 40px;text-align:center;}
.finish-wrap .big{font-size:44px;margin-bottom:10px;}
.finish-wrap h2{color:var(--navy);font-size:24px;margin:0 0 8px;}
.finish-wrap p{color:var(--muted);font-size:14px;max-width:520px;margin:0 auto 26px;}
.skill-list{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:26px;}
.skill-list .sk{width:190px;border:1px solid var(--border);border-radius:8px;padding:16px;text-align:left;}
.skill-list .sk .n{width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;margin-bottom:8px;}
.skill-list .sk b{display:block;color:var(--navy);font-size:13.5px;margin-bottom:4px;}
.skill-list .sk span{color:var(--muted);font-size:12px;}
.code-block{max-width:420px;margin:0 auto 26px;background:#f5f8fa;border:1px dashed var(--border);border-radius:10px;padding:18px 20px;}
.code-lbl{font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--muted-2);margin-bottom:10px;}
.code-row{display:flex;align-items:center;gap:10px;}
.code-row code{flex:1;font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:19px;font-weight:700;letter-spacing:.04em;color:var(--navy);background:#fff;border:1px solid var(--border);border-radius:6px;padding:10px 14px;}
.code-copy{border:none;background:var(--navy);color:#fff;font-weight:700;font-size:13px;border-radius:6px;padding:11px 16px;cursor:pointer;flex:none;}
.code-copy:hover{background:var(--navy-2);}
.code-copy.copied{background:var(--green);}
.code-hint{font-size:12px;color:var(--muted);margin-top:10px;}
.code-block.locked{background:#f0f3f7;border-color:#c3cfdd;}
.code-block.locked .code-lbl{color:var(--muted);}
.code-block.locked code.masked{color:var(--muted-2);letter-spacing:.12em;background:#e7edf3;border-color:#c3cfdd;}
.code-block.unlocked{background:#e5f9f6;border:1px dashed var(--green);}
.code-block.unlocked .code-lbl{color:var(--green-d);}
.path-tracker{max-width:420px;margin:0 auto 22px;text-align:left;}
.path-row{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--navy);padding:8px 0;border-bottom:1px solid #eef2f6;}
.path-badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:12px;flex:none;}
.path-badge.done{background:#d5f5ef;color:var(--green-d);}
.path-badge.todo{background:#f0f3f7;color:var(--muted-2);}
#resume-banner{display:none;align-items:center;gap:12px;background:#fff4ed;border:1px solid #ffcbb5;border-radius:10px;padding:12px 16px;margin-bottom:14px;flex-wrap:wrap;}
#resume-banner .rb-text{flex:1;font-size:13.5px;color:var(--navy);font-weight:600;min-width:200px;}
#resume-banner .btn{padding:7px 14px;font-size:13px;}
[data-hotspot="true"]:focus-visible{outline:3px solid var(--navy);outline-offset:3px;}
.btn:focus-visible,.code-copy:focus-visible{outline:3px solid var(--navy);outline-offset:2px;}
@media (prefers-reduced-motion: reduce){
  .hotspot::before,.hs-sb-icon.hotspot::after,.cta-flag,.cta-flag.below{animation:none !important;}
}

@media (max-width:920px){
  .rec-body{flex-direction:column;}
  .rec-left,.rec-right{width:100%;border-right:none;border-bottom:1px solid var(--border);}
  #stage{overflow-x:auto;}
}

<body>
<div id="page">
  <header id="brief">

  <div id="resume-banner" role="dialog" aria-label="Resume progress">

  </div>

  <div id="coach">
    <div class="coach-left">

    <div class="hint" id="coach-hint">Follow the pointer</div>
  </div>

  <div id="stage-wrap">
    <div id="browser-chrome">
      <div class="tl"><span></span><span></span><span></span></div>

    </div>
    <div id="stage"><div id="stage-inner"></div><div id="cta-flag" class="cta-flag" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a1.6 1.6 0 0 1 1.6 1.6v9.9l3-3a1.5 1.5 0 0 1 2.2 2l-5.7 5.9a1.6 1.6 0 0 1-2.2 0l-5.7-5.9a1.5 1.5 0 0 1 2.2-2l3 3V4.6A1.6 1.6 0 0 1 12 3z"/></svg></div></div>
  </div>

  <div id="restart-link" onclick="restartAll()">↺ Restart the whole simulation</div>
</div>

<script>

/* ============================= SHARED SHELL PIECES ============================= */

    </div>
  </div>`;
}

function sidebar(opts){
  opts = opts || {};
  const icons = [
    {k:'bookmark', ic:'bookmark'},
    {k:'contacts', ic:'contacts'},
    {k:'megaphone', ic:'megaphone'},
    {k:'grid', ic:'grid'},
    {k:'store', ic:'store'},
    {k:'wallet', ic:'wallet'},
    {k:'alarm', ic:'alarm'},
    {k:'database', ic:'database'},
    {k:'sitemap', ic:'sitemap'},
    {k:'chart', ic:'chart'},
  ];
  let html = '<div class="hs-sidebar">';
  icons.forEach(o=>{
    const active = opts.active===o.k ? ' active' : '';
    const hot = opts.hotspot===o.k ? ' hotspot' : '';
    const dattr = opts.hotspot===o.k ? ' data-hotspot="true"' : '';
    html += `<div class="hs-sb-icon${active}${hot}"${dattr} data-act="${o.k}">${I(o.ic)}</div>`;
    if(o.k==='megaphone') html += '<div class="hs-sb-sep"></div>';
  });
  html += '<div style="flex:1"></div><div class="hs-sb-icon">'+I('chevdown')+'</div></div>';
  return html;
}

function crmFlyout(hotspotItem){
  const items = ['Contacts','Companies','Deals','Tickets','Products','Orders','Services Agreement','__sep__','Segments (Lists)','Inbox','Calls','Meetings','Tasks','Playbooks','Message Templates','Snippets'];
  let html = '<div class="flyout"><div class="fy-title">CRM</div>';
  items.forEach(it=>{
    if(it==='__sep__'){ html+='<div class="fy-sep"></div>'; return; }
    const isTasks = it==='Tasks';
    const hi = (hotspotItem===it) ? ' hi' : '';
    const hotAttr = (hotspotItem===it) ? ' data-hotspot="true"' : '';
    html += `<a class="fy-item${hi}"${hotAttr} data-crmitem="${it}">${it}${isTasks? '<span class="fy-bookmark-ic">'+I('bookmark')+'</span>':''}</a>`;
  });
  html += '</div>';
  return html;
}

function bookmarksFlyout(){
  return `<div class="bm-flyout">

    <a class="bm-item hi" data-hotspot="true" data-bmitem="Tasks">Tasks</a>
    <div class="bm-sep"></div>
    <div class="bm-manage">${I('bookmark')} Manage</div>

}

function toast(msg){
  return `<div class="hs-toast">${msg}<span class="xx">${I('x')}</span></div>`;
}

/* ---- reusable Tasks list toolbar+tabs (module 2/3) ---- */
function taskTabs(activeTab, opts){
  opts = opts||{};
  const tabs = [
    {k:'all', label:'All tasks', count: opts.allCount},
    {k:'today', label:'Due today', count: opts.todayCount},
    {k:'overdue', label:'Overdue', count: opts.overdueCount},
    {k:'upcoming', label:'Upcoming'},
    {k:'unassigned', label:'Unassigned'},
  ];
  let html = '<div class="task-tabs">';
  tabs.forEach(t=>{
    const active = t.k===activeTab ? ' active' : '';
    const hot = opts.hotTab===t.k ? ' hotspot' : '';
    const dattr = opts.hotTab===t.k ? ' data-hotspot="true"' : '';
    html += `<div class="tab${active}${hot}"${dattr} data-tab="${t.k}">${t.label}${t.count?`<span class="count">${t.count}</span>`:''}</div>`;
  });
  html += '<div class="plus">+</div><div class="spacer"></div>';
  if(opts.rightBtn) html += opts.rightBtn;
  html += '</div>';
  return html;
}

/* ---------------- FINISH ---------------- */
function finishRender(){
  const bothDone = completedBranches.complete && completedBranches.note;
  const otherKey = branch === 'complete' ? 'note' : 'complete';
  const otherLabel = otherKey === 'note' ? 'the "student is busy" note & pin flow' : 'the "task completed" flow';
  const otherDone = completedBranches[otherKey];

  // Progress on the two outcome paths
  const pathState = (done)=> done
    ? `<span class="path-badge done">✓ Done</span>`
    : `<span class="path-badge todo">Not yet</span>`;

  const codeSection = bothDone
    ? `<div class="code-block unlocked">
         <div class="code-lbl">✓ COMPLETION CODE UNLOCKED</div>
         <div class="code-row">
           <code id="completion-code">${DATA.completionCode}</code>
           <button class="code-copy" onclick="copyCompletionCode(this)">Copy</button>
         </div>
         <div class="code-hint">Paste this into the course to record that you finished the walkthrough.</div>
       </div>`
    : `<div class="code-block locked">
         <div class="code-lbl">🔒 COMPLETION CODE LOCKED</div>
         <div class="code-row">
           <code class="masked">••••-••••-••••</code>
         </div>
         <div class="code-hint">Finish <b>both</b> outcome paths below to unlock your code. You've done ${completedBranches.complete && completedBranches.note ? 'both' : (completedBranches.complete || completedBranches.note) ? 'one of two' : 'zero of two'}.</div>
       </div>`;

  const cta = bothDone
    ? `<button class="btn btn-ghost" onclick="restartAll()">↺ Restart from the beginning</button>`
    : `<button class="btn btn-orange" onclick="tryOtherBranch()">Do ${otherLabel} to unlock →</button>
       &nbsp;
       <button class="btn btn-ghost" onclick="restartAll()">↺ Restart</button>`;

  return `${topbar()}<div class="hs-body">${sidebar({active:'bookmark'})}<div class="hs-main">
    <div class="finish-wrap">
      <div class="big">${bothDone ? '🎓' : '👍'}</div>
      <h2>${bothDone ? "That's the full walkthrough — nicely done" : "Great — one path down, one to go"}</h2>
      <p>You practiced the core skills for HubSpot's task list, from signing in through to leaving a clean record for the team.</p>
      <div class="skill-list">
        <div class="sk"><div class="n">1</div><b>Log in & bookmark</b><span>Find Tasks via the CRM menu and pin it for daily use.</span></div>
        <div class="sk"><div class="n">2</div><b>Views & columns</b><span>Switch views, filter by owner, and customise your columns.</span></div>
        <div class="sk"><div class="n">3</div><b>Work a task</b><span>Cross-check task notes against the services agreement before acting.</span></div>
        <div class="sk"><div class="n">4</div><b>Log the outcome</b><span>Complete the task, or leave a pinned note for the team.</span></div>
      </div>
      <div class="path-tracker">
        <div class="path-row">${pathState(completedBranches.complete)} Outcome A — student booked, task completed</div>
        <div class="path-row">${pathState(completedBranches.note)} Outcome B — student busy, note created &amp; pinned</div>
      </div>
      ${codeSection}
      ${cta}
    </div>
  </div></div>`;
}

function copyCompletionCode(btn){
  const el = document.getElementById('completion-code');
  if(!el) return;
  const text = el.textContent;
  const done = ()=>{ const o = btn.textContent; btn.textContent = 'Copied ✓'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent = o; btn.classList.remove('copied'); }, 1800); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>{ fallbackCopy(text); done(); });
  } else { fallbackCopy(text); done(); }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}

/* ============================= ENGINE ============================= */
function moduleOf(step){ return step.module; }

function visibleSteps(){
  return STEPS.filter(s => !s.branchOnly || s.branchOnly === branch);
}

function findIndexByKey(key){
  const arr = visibleSteps();
  return arr.findIndex(s=>s.key===key);
}

function renderProgress(activeModule, doneModules){
  const labels = ['Log in & bookmark','Views & columns','Work a task','Log the outcome'];
  let html = '';
  for(let m=1; m<=4; m++){
    let cls = '';
    if(m===activeModule) cls='active'; else if(doneModules.includes(m)) cls='done';
    html += `<div class="mod-chip ${cls}"><div class="dot">${doneModules.includes(m)&&m!==activeModule?'✓':m}</div>${labels[m-1]}</div>`;
  }
  document.getElementById('module-progress').innerHTML = html;
}

let finished = false;

function positionCTA(){
  const cta = document.getElementById('cta-flag');
  const stage = document.getElementById('stage');
  const hotspotEl = document.querySelector('#stage-inner [data-hotspot="true"]');
  if(!hotspotEl){ cta.style.display = 'none'; return; }
  const stageRect = stage.getBoundingClientRect();
  const elRect = hotspotEl.getBoundingClientRect();
  const ptrH = 30;             // pointer height + gap
  const gap = 6;
  const spaceAbove = elRect.top - stageRect.top;
  const placeAbove = spaceAbove > ptrH + gap;   // prefer sitting above, pointing down
  cta.style.display = 'block';
  cta.classList.toggle('below', !placeAbove);
  const top = placeAbove ? (spaceAbove - ptrH) : (elRect.bottom - stageRect.top + gap);
  let left = elRect.left - stageRect.left + elRect.width/2;
  left = Math.max(20, Math.min(left, stageRect.width - 20));
  cta.style.top = Math.max(2, top) + 'px';
  cta.style.left = left + 'px';
}
window.addEventListener('resize', positionCTA);

function renderStep(){
  finished = false;
  const arr = visibleSteps();
  if(stepIndex >= arr.length){ renderFinish(); return; }
  const step = arr[stepIndex];
  const stageInner = document.getElementById('stage-inner');
  stageInner.innerHTML = step.render();
  document.getElementById('addr-bar').textContent = step.key==='login' ? 'app.hubspot.com/login' : 'app.hubspot.com/tasks/wallstreetenglish';

  // progress chips
  const doneModules = [];
  for(let m=1; m<step.module; m++) doneModules.push(m);
  renderProgress(step.module, doneModules);

  // coach panel
  document.getElementById('coach-mod').textContent = 'STEP '+step.module;
  document.getElementById('coach-title').textContent = step.title;
  document.getElementById('coach-body').textContent = ' '+step.body;
  // "screen X of Y" within the current section, so learners know how far along they are
  const sectionSteps = arr.filter(s=>s.module===step.module);
  const posInSection = sectionSteps.indexOf(step) + 1;
  document.getElementById('coach-count').textContent = posInSection+' of '+sectionSteps.length;
  document.getElementById('coach-hint').style.display = '';

  step.wire(stageInner, advance);
  positionCTA();
  requestAnimationFrame(positionCTA);
  enhanceHotspotA11y();
  saveProgress();
  window.scrollTo({top:0, behavior:'smooth'});
}

function advance(){
  stepIndex++;
  const arr = visibleSteps();
  if(stepIndex >= arr.length){ renderFinish(); return; }
  renderStep();
  saveProgress();
}

/* Called only when a learner genuinely reaches the end of an outcome path
   through real clicks. Marks that branch complete and persists it. */
function gotoFinish(){
  if(branch === 'complete' || branch === 'note'){
    completedBranches[branch] = true;
  }
  saveProgress();
  renderFinish();
}

function renderFinish(){
  finished = true;
  const stageInner = document.getElementById('stage-inner');
  stageInner.innerHTML = finishRender();
  document.getElementById('addr-bar').textContent = 'app.hubspot.com/tasks/wallstreetenglish';
  renderProgress(5, [1,2,3,4]);
  const bothDone = completedBranches.complete && completedBranches.note;
  document.getElementById('coach-mod').textContent = bothDone ? 'COMPLETE' : 'ALMOST THERE';
  document.getElementById('coach-title').textContent = bothDone ? 'Training finished' : 'One path left to unlock your code';
  document.getElementById('coach-body').textContent = bothDone
    ? " You've completed both outcome paths — your completion code is unlocked below."
    : " Complete the other outcome path (the button below) to unlock your completion code.";
  document.getElementById('coach-count').textContent = '';
  document.getElementById('coach-hint').style.display = 'none';
  positionCTA();
  requestAnimationFrame(positionCTA);
  window.scrollTo({top:0, behavior:'smooth'});
}

function tryOtherBranch(){
  branch = branch === 'complete' ? 'note' : 'complete';
  stepIndex = findIndexByKey('call-outcome') + 1;
  renderStep();
  saveProgress();
}

function restartAll(){
  branch = null;
  stepIndex = 0;
  completedBranches = { complete:false, note:false };
  clearProgress();
  renderStep();
}

/* ---------------- Progress persistence (works when hosted as a file) ---------------- */
function saveProgress(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ stepIndex, branch, completedBranches }));
  }catch(e){ /* private mode / disabled storage — silently continue */ }
}
function clearProgress(){
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
}
function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}

/* ---------------- Keyboard accessibility ---------------- */
/* Enter / Space activates the currently highlighted hotspot; also make the
   hotspot focusable so keyboard users can tab to it. */
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' || e.key === ' '){
    const active = document.activeElement;
    if(active && active.getAttribute && active.getAttribute('data-hotspot') === 'true'){
      e.preventDefault();
      active.click();
      return;
    }
    // If focus isn't on the hotspot, Enter still advances via the visible hotspot
    const hs = document.querySelector('#stage-inner [data-hotspot="true"]');
    if(hs && (active === document.body || !active)){
      e.preventDefault();
      hs.click();
    }
  }
});

/* After each render, make the hotspot keyboard-focusable and labelled. */
function enhanceHotspotA11y(){
  const hs = document.querySelector('#stage-inner [data-hotspot="true"]');
  if(!hs) return;
  hs.setAttribute('tabindex','0');
  hs.setAttribute('role','button');
  if(!hs.getAttribute('aria-label')){
    const txt = (hs.textContent || '').trim();
    hs.setAttribute('aria-label', (txt ? txt : 'Continue') + ' — press Enter to activate');
  }
  hs.focus({preventScroll:true});
}

/* ---------------- Resume prompt ---------------- */
function offerResume(){
  const saved = loadProgress();
  if(!saved) return false;
  const anyProgress = saved.stepIndex > 0 || saved.completedBranches.complete || saved.completedBranches.note;
  if(!anyProgress) return false;
  const banner = document.getElementById('resume-banner');
  banner.style.display = 'flex';
  document.getElementById('resume-yes').onclick = ()=>{
    stepIndex = saved.stepIndex || 0;
    branch = saved.branch || null;
    completedBranches = saved.completedBranches || { complete:false, note:false };
    banner.style.display = 'none';
    renderStep();
  };
  document.getElementById('resume-no').onclick = ()=>{
    clearProgress();
    completedBranches = { complete:false, note:false };
    banner.style.display = 'none';
    renderStep();
  };
  return true;
}

/* init */
if(!offerResume()){
  renderStep();
}

</script>
<script>
/* ---------------- Auto-resizing iframe embed ----------------
   When this page is embedded via a plain <iframe> (e.g. in Articulate Rise), the
   iframe's own height attribute is a static guess that can't track this page's real
   height, which changes per training step. Report our real height to the parent
   window on load and whenever it changes, so a small listener script on the host
   page can keep the iframe sized to match (see the trainer's README for the
   matching parent-side snippet). No-op entirely when opened as a normal page. */
(function(){
  if(!window.parent || window.parent === window) return;
  var pageEl = document.getElementById('page');
  var lastHeight = 0;
  function reportHeight(){
    var h = pageEl.scrollHeight;
    if(h !== lastHeight){
      lastHeight = h;
      window.parent.postMessage({ type: 'wse-hubspot-tasklist-resize', height: h }, '*');
    }
  }
  if(window.ResizeObserver){
    new ResizeObserver(reportHeight).observe(pageEl);
  } else {
    window.addEventListener('resize', reportHeight);
    setInterval(reportHeight, 500);
  }
  reportHeight();
})();
</script>
